name: Actualizar Catálogo Mayorista

on:
  # Se ejecuta automáticamente cada hora
  schedule:
    - cron: '0 * * * *'
  # También se puede ejecutar manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Obtener productos de Tienda Nube
        env:
          TIENDANUBE_STORE_ID:     ${{ secrets.TIENDANUBE_STORE_ID }}
          TIENDANUBE_ACCESS_TOKEN: ${{ secrets.TIENDANUBE_ACCESS_TOKEN }}
        run: python fetch_products.py

      - name: Confirmar y pushear products.json
        run: |
          git config user.name  "Fressia Bot"
          git config user.email "bot@fressia.net"
          git add products.json
          git diff --cached --quiet || git commit -m "chore: actualizar catálogo $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
